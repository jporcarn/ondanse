name: Bootstrap Terraform Backend and Deploy

on:
  workflow_dispatch:

jobs:
  bootstrap-and-plan:
    name: Bootstrap Terraform Backend and Plan
    runs-on: ubuntu-latest
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate Azure credentials are set
        run: |
          missing=0
          for var in ARM_CLIENT_ID ARM_CLIENT_SECRET ARM_TENANT_ID ARM_SUBSCRIPTION_ID; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is empty. Set it under Settings > Secrets and variables > Actions."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Login to Azure
        run: |
          az login --service-principal \
            --username "$ARM_CLIENT_ID" \
            --password "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID"
          az account set --subscription "$ARM_SUBSCRIPTION_ID"
          echo "Authenticated as subscription: $(az account show --query name -o tsv)"
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.15.6
      - name: Bootstrap backend resources
        run: |
          chmod +x infra/bootstrap-terraform-backend.sh
          infra/bootstrap-terraform-backend.sh "$ARM_SUBSCRIPTION_ID"
      - name: Terraform init
        working-directory: ./infra
        run: terraform init
      - name: Terraform plan
        working-directory: ./infra
        run: terraform plan -var-file="terraform.tfvars"
