name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint + TypeScript
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [backend, frontend]
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install pnpm
        run: |
          npm install -g pnpm@latest
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Install dependencies
        run: pnpm install
      - name: Run lint
        run: pnpm run lint

  build:
    name: Build frontend and backend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install pnpm
        run: |
          npm install -g pnpm@latest
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Install dependencies
        run: pnpm install
      - name: Build backend
        run: pnpm --dir packages/backend run build
      - name: Build frontend
        run: pnpm --dir packages/frontend run build
