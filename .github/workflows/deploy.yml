name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: ondanse-rg
  BACKEND_APP_NAME: ondanse-api
  BACKEND_URL: https://ondanse-api.azurewebsites.net

jobs:
  deploy-backend:
    name: Deploy backend to Azure Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install pnpm
        run: |
          npm install -g pnpm@latest
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Install dependencies
        run: pnpm install
      - name: Build backend
        run: pnpm --dir packages/backend run build
      - name: Stage deployment package
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp -r packages/backend/dist deploy/dist
          cp packages/backend/package.json deploy/package.json
          # @ondanse/shared is a type-only dependency (erased at compile time);
          # npm cannot resolve the pnpm workspace: protocol, so drop it.
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('deploy/package.json','utf8'));delete p.dependencies['@ondanse/shared'];fs.writeFileSync('deploy/package.json',JSON.stringify(p,null,2)+'\n');"
          (cd deploy && npm install --omit=dev --no-package-lock)
          (cd deploy && zip -r ../backend.zip .)
      - name: Login to Azure
        run: |
          az login --service-principal \
            --username "${{ secrets.ARM_CLIENT_ID }}" \
            --password "${{ secrets.ARM_CLIENT_SECRET }}" \
            --tenant "${{ secrets.ARM_TENANT_ID }}"
          az account set --subscription "${{ secrets.ARM_SUBSCRIPTION_ID }}"
      - name: Deploy ZIP to Web App
        run: |
          az webapp deploy \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$BACKEND_APP_NAME" \
            --src-path backend.zip \
            --type zip
      - name: Smoke test /api/health
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "$BACKEND_URL/api/health"; then
              echo ""
              echo "✅ Backend is reachable."
              exit 0
            fi
            echo "Attempt $i: backend not ready yet, waiting 15s..."
            sleep 15
          done
          echo "::error::Backend did not respond to /api/health in time."
          exit 1

  deploy-frontend:
    name: Deploy frontend to Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install pnpm
        run: |
          npm install -g pnpm@latest
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Install dependencies
        run: pnpm install
      - name: Build frontend
        run: pnpm --dir packages/frontend run build
        env:
          VITE_API_BASE_URL: ${{ env.BACKEND_URL }}
      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: packages/frontend/dist
          skip_app_build: true
          output_location: ""
